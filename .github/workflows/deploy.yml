name: Deploy Skills

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-agent-skills
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      RSYNC_DELETE: ${{ secrets.DEPLOY_RSYNC_DELETE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          : "${SSH_HOST:?missing DEPLOY_SSH_HOST}"
          : "${SSH_USER:?missing DEPLOY_SSH_USER}"
          : "${SSH_PRIVATE_KEY:?missing DEPLOY_SSH_PRIVATE_KEY}"
          : "${DEPLOY_PATH:?missing DEPLOY_PATH}"

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Prepare SSH options
        id: ssh_opts
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          OPTS="-p ${PORT} -o BatchMode=yes -o ConnectTimeout=10 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          echo "port=${PORT}" >> "$GITHUB_OUTPUT"
          echo "opts=${OPTS}" >> "$GITHUB_OUTPUT"

      - name: Check SSH connectivity
        run: |
          set -euo pipefail
          ssh ${{ steps.ssh_opts.outputs.opts }} "$SSH_USER@$SSH_HOST" "echo '[ok] ssh connected'; uname -a"

      - name: Ensure deploy path exists
        run: |
          set -euo pipefail
          ssh ${{ steps.ssh_opts.outputs.opts }} "$SSH_USER@$SSH_HOST" "mkdir -p \"$DEPLOY_PATH\""

      - name: Sync files
        run: |
          set -euo pipefail

          DELETE_FLAG=""
          if [ "${RSYNC_DELETE:-false}" = "true" ]; then
            DELETE_FLAG="--delete"
          fi

          rsync -az ${DELETE_FLAG} \
            -e "ssh ${{ steps.ssh_opts.outputs.opts }}" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude 'node_modules/' \
            --exclude '.pnpm-store/' \
            --exclude '.DS_Store' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Run install script on server
        run: |
          set -euo pipefail
          ssh ${{ steps.ssh_opts.outputs.opts }} "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" << 'EOF'
            set -euxo pipefail
            cd "$DEPLOY_PATH"
            test -f install.sh
            chmod +x install.sh
            ./install.sh
          EOF
