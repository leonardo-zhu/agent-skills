name: Deploy Skills

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-agent-skills
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      TARGET_HOME: ${{ secrets.DEPLOY_TARGET_HOME }}
      RSYNC_DELETE: ${{ secrets.DEPLOY_RSYNC_DELETE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          : "${SSH_HOST:?missing DEPLOY_SSH_HOST}"
          : "${SSH_USER:?missing DEPLOY_SSH_USER}"
          : "${SSH_PRIVATE_KEY:?missing DEPLOY_SSH_PRIVATE_KEY}"
          : "${DEPLOY_PATH:?missing DEPLOY_PATH}"

      - name: Validate deploy path safety
        run: |
          set -euo pipefail
          
          # Prevent deployment to the root directory
          if [ "$DEPLOY_PATH" = "/" ] || [ "$DEPLOY_PATH" = "/*" ]; then
            echo "::error::FATAL: DEPLOY_PATH is set to the root directory ('/'). Deployment aborted to prevent catastrophic data loss."
            exit 1
          fi
          
          # Prevent directory traversal
          if [[ "$DEPLOY_PATH" == *"/.."* ]]; then
            echo "::error::FATAL: DEPLOY_PATH cannot contain directory traversal patterns (..)."
            exit 1
          fi
          
          # Prevent deployment to critical system directories
          for DANGEROUS_PATH in "/bin" "/boot" "/dev" "/etc" "/home" "/lib" "/lib64" "/media" "/mnt" "/opt" "/proc" "/root" "/run" "/sbin" "/srv" "/sys" "/tmp" "/usr" "/var" "/usr/bin" "/usr/lib" "/usr/local" "/var/run" "/var/log"; do
            if [ "$DEPLOY_PATH" = "$DANGEROUS_PATH" ] || [ "$DEPLOY_PATH" = "${DANGEROUS_PATH}/" ]; then
              echo "::error::FATAL: DEPLOY_PATH is set to a critical system directory ($DEPLOY_PATH). Deployment aborted."
              exit 1
            fi
          done

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Prepare SSH options
        id: ssh_opts
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          OPTS="-p ${PORT} -o BatchMode=yes -o ConnectTimeout=10 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          echo "port=${PORT}" >> "$GITHUB_OUTPUT"
          echo "opts=${OPTS}" >> "$GITHUB_OUTPUT"

      - name: Check SSH connectivity
        run: |
          set -euo pipefail
          ssh ${{ steps.ssh_opts.outputs.opts }} "$SSH_USER@$SSH_HOST" "echo '[ok] ssh connected'; uname -a"

      - name: Ensure deploy path exists
        run: |
          set -euo pipefail
          ssh ${{ steps.ssh_opts.outputs.opts }} "$SSH_USER@$SSH_HOST" "mkdir -p \"$DEPLOY_PATH\""

      - name: Pack release
        env:
          RELEASE_ID: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .release/app
          rsync -a ./ .release/app/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.claude' \
            --exclude 'node_modules/' \
            --exclude '.pnpm-store/' \
            --exclude '.DS_Store'
          tar -C .release -czf ".release/release-${RELEASE_ID}.tgz" app

      - name: Deploy via SCP and extract
        env:
          RELEASE_ID: ${{ github.sha }}
        run: |
          set -euo pipefail
          ARCHIVE_NAME="release-${RELEASE_ID}.tgz"
          ARCHIVE_PATH=".release/${ARCHIVE_NAME}"
          
          # Create isolated .tmp directory for transfer
          ssh ${{ steps.ssh_opts.outputs.opts }} "$SSH_USER@$SSH_HOST" "mkdir -p \"$DEPLOY_PATH/.tmp\""

          # Transfer the archive to .tmp/ on the server
          scp ${{ steps.ssh_opts.outputs.opts }} "$ARCHIVE_PATH" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/.tmp/$ARCHIVE_NAME"

          # Extract into isolated release directory and switch symlink
          ssh ${{ steps.ssh_opts.outputs.opts }} "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' RELEASE_ID='$RELEASE_ID' ARCHIVE_NAME='$ARCHIVE_NAME' TARGET_HOME='$TARGET_HOME' bash -s" << 'EOF'
            set -euxo pipefail
            
            RELEASES_DIR="$DEPLOY_PATH/releases"
            RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
            CURRENT_LINK="$DEPLOY_PATH/current"
            
            # 1. Create a fresh directory for this specific release
            mkdir -p "$RELEASES_DIR"
            mkdir -p "$RELEASE_DIR"
            
            # 2. Extract into the fresh directory (automatically missing deleted files!)
            tar -xzf "$DEPLOY_PATH/.tmp/$ARCHIVE_NAME" -C "$RELEASE_DIR" --strip-components=1
            
            # 3. Atomically switch the symlink to point to the new release
            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"
            
            # Clean up the payload
            rm -f "$DEPLOY_PATH/.tmp/$ARCHIVE_NAME"
            
            # Execute install script from the NEW current directory
            cd "$CURRENT_LINK"
            test -f install.sh
            chmod +x install.sh
            ./install.sh
            
            # (Optional) Clean up old releases, keeping the 3 most recent
            ls -1dt "$RELEASES_DIR"/* 2>/dev/null | tail -n +4 | xargs -r rm -rf
          EOF
